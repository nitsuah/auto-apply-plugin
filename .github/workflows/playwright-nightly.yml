name: Playwright Nightly

on:
  schedule:
    - cron: "0 6 * * *" # 06:00 UTC daily
  workflow_dispatch:

concurrency:
  group: nightly-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  playwright-nightly:
    name: Nightly E2E
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v7

      - name: Build e2e image
        run: docker build --target e2e -t auto-apply-plugin:e2e .

      - name: Run Playwright (full suite)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/playwright-report:/app/playwright-report \
            -v ${{ github.workspace }}/test-results:/app/test-results \
            auto-apply-plugin:e2e npm run test:e2e

      - name: Upload report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report-nightly-${{ github.run_id }}
          path: playwright-report/
          retention-days: 30

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-screenshots-nightly-${{ github.run_id }}
          path: test-results/
          retention-days: 14
