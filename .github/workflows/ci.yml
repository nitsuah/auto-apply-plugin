name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build test image
        run: docker build --target test -t auto-apply-plugin:test .

      - name: Lint
        run: docker run --rm auto-apply-plugin:test npm run lint

      - name: Test
        run: docker run --rm auto-apply-plugin:test npm test

      - name: Coverage
        run: docker run --rm auto-apply-plugin:test npm run test:coverage