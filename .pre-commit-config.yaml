repos:
  # General hooks for common issues
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict

  # Security checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: detect-private-key
      - id: check-added-large-files # Helps prevent committing large binary files or sensitive data

  # JavaScript specific hooks
  # ESLint for linting JavaScript files
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v8.56.0 # Use a recent stable version
    hooks:
      - id: eslint
        files: \.(js|jsx|ts|tsx)$ # Target common JavaScript and TypeScript file extensions
        # args: [--fix] # Uncomment to automatically fix issues where possible

  # Prettier for formatting code
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.1 # Use a recent stable version
    hooks:
      - id: prettier
        types: [javascript, json, yaml, markdown] # Prettier handles many file types
        # args: [--write] # Uncomment to automatically format and write changes to files