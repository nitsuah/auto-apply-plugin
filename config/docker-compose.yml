# docker-compose.yml

services:
  test:
    image: auto-apply-plugin-test
    build:
      context: ..
      target: test
    command: npm test

  lint:
    image: auto-apply-plugin-lint
    build:
      context: ..
      target: test
    command: npm run lint

  coverage:
    image: auto-apply-plugin-coverage
    build:
      context: ..
      target: test
    command: npm run test:coverage

  e2e:
    image: auto-apply-plugin-e2e
    build:
      context: ..
      target: e2e
    command: sh -c "npm run build && node scripts/capture-screenshots.mjs"
